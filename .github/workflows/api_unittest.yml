name: Headless Unittest

on:
  push:
    branches:
      - v11(LTS)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore workloads
        run: dotnet workload restore ./HeadlessTest.RelativeControl.DataGrid/HeadlessTest.RelativeControl.DataGrid.csproj

      - name: Restore dependencies
        run: dotnet restore ./HeadlessTest.RelativeControl.DataGrid/HeadlessTest.RelativeControl.DataGrid.csproj

      - name: Build
        run: dotnet build --no-restore --configuration Release ./HeadlessTest.RelativeControl.DataGrid/HeadlessTest.RelativeControl.DataGrid.csproj

      - name: Run tests
        run: dotnet run --project ./HeadlessTest.RelativeControl.DataGrid/HeadlessTest.RelativeControl.DataGrid.csproj
  push_to_nuget:
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - uses: actions/checkout@v5
      # 设置 .NET 环境
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      # 恢复依赖项
      - name: Restore dependencies
        run: dotnet restore ./src/RelativeControl.Avalonia.DataGrid/RelativeControl.Avalonia.DataGrid.csproj
      # 构建项目
      - name: Build project
        run: dotnet build ./src/RelativeControl.Avalonia.DataGrid/RelativeControl.Avalonia.DataGrid.csproj --configuration Release
      # 发布到 NuGet.org
      - name: Publish Packages to NuGet
        run: dotnet nuget push ./src/RelativeControl.Avalonia.DataGrid/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}
  push_to_github_package:
    needs: 
      - test
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - uses: actions/checkout@v5
      # 设置 .NET 环境
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      # 恢复依赖项
      - name: Restore dependencies
        run: dotnet restore ./src/RelativeControl.Avalonia.DataGrid/RelativeControl.Avalonia.DataGrid.csproj
      # 构建项目
      - name: Build project
        run: dotnet build ./src/RelativeControl.Avalonia.DataGrid/RelativeControl.Avalonia.DataGrid.csproj --configuration Release
      # 发布到 GitHub Packages
      - name: Publish Packages to GitHub Packages
        run: dotnet nuget push "./src/RelativeControl.Avalonia.DataGrid/bin/Release/*.nupkg" --source https://nuget.pkg.github.com/metaone01/index.json --api-key ${{ secrets.PACKAGE_API_KEY }} --skip-duplicate
      - name: Publish Package Symbols to GitHub Packages
        run: dotnet nuget push "./src/RelativeControl.Avalonia.DataGrid/bin/Release/*.snupkg" --source https://nuget.pkg.github.com/metaone01/index.json --api-key ${{ secrets.PACKAGE_API_KEY }} --skip-duplicate
