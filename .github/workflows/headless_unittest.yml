name: Headless Unittest

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore workloads
        run: dotnet workload restore ./HeadlessTest.RelativeControl.DataGrid/HeadlessTest.RelativeControl.DataGrid.csproj

      - name: Restore dependencies
        run: dotnet restore ./HeadlessTest.RelativeControl.DataGrid/HeadlessTest.RelativeControl.DataGrid.csproj

      - name: Build
        run: dotnet build --no-restore --configuration Release ./HeadlessTest.RelativeControl.DataGrid/HeadlessTest.RelativeControl.DataGrid.csproj

      - name: Run tests
        run: dotnet run --project ./HeadlessTest.RelativeControl.DataGrid/HeadlessTest.RelativeControl.DataGrid.csproj